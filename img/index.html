<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이타닉 생존자 분석 앱</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV 파서) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
        }
        /* 로딩 스피너 애니메이션 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 p-6 md:p-10 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm p-6 text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">🚢 타이타닉 생존자 분석 대시보드</h1>
            <p class="text-gray-500">객실 등급별, 연령별, 성별 생존율을 확인하세요. (데이터 자동 로드됨)</p>
        </header>

        <!-- Loading Section -->
        <section id="loadingSection" class="bg-white rounded-2xl shadow-sm p-12 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p class="text-lg font-medium text-gray-600">데이터를 불러오고 분석하는 중입니다...</p>
        </section>

        <!-- Dashboard (Hidden initially) -->
        <main id="dashboard" class="hidden space-y-6">
            
            <!-- Filter Section -->
            <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col sm:flex-row items-center justify-between">
                <h2 class="text-xl font-bold text-gray-800 mb-4 sm:mb-0">분석 조건 설정</h2>
                <div class="flex items-center space-x-3">
                    <label for="pclassFilter" class="font-medium text-gray-600">객실 등급(Pclass):</label>
                    <select id="pclassFilter" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                        <option value="all">전체 (All Classes)</option>
                        <option value="1">1등석 (1st Class)</option>
                        <option value="2">2등석 (2nd Class)</option>
                        <option value="3">3등석 (3rd Class)</option>
                    </select>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-gray-400">
                    <h3 class="text-gray-500 text-sm font-medium mb-1">선택된 총 승객 수</h3>
                    <p class="text-3xl font-bold text-gray-800" id="totalPassengers">0</p>
                </div>
                <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-emerald-400">
                    <h3 class="text-gray-500 text-sm font-medium mb-1">생존자 수</h3>
                    <p class="text-3xl font-bold text-emerald-600" id="totalSurvived">0</p>
                </div>
                <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-blue-400">
                    <h3 class="text-gray-500 text-sm font-medium mb-1">평균 생존율</h3>
                    <p class="text-3xl font-bold text-blue-600" id="totalRate">0%</p>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Gender Chart -->
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">성별 생존 분석</h3>
                    <canvas id="genderChart" height="250"></canvas>
                </div>
                <!-- Age Chart -->
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">연령별 생존 분석</h3>
                    <canvas id="ageChart" height="250"></canvas>
                </div>
            </div>

            <!-- Data Tables Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Gender Table -->
                <div class="bg-white rounded-2xl shadow-sm p-6 overflow-x-auto">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">성별 상세 수치</h3>
                    <table class="w-full text-sm text-left text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3">성별</th>
                                <th scope="col" class="px-6 py-3 text-right">총 탑승자</th>
                                <th scope="col" class="px-6 py-3 text-right">생존자</th>
                                <th scope="col" class="px-6 py-3 text-right">사망자</th>
                                <th scope="col" class="px-6 py-3 text-right text-blue-600">생존율</th>
                            </tr>
                        </thead>
                        <tbody id="genderTableBody">
                            <!-- JS 렌더링 영역 -->
                        </tbody>
                    </table>
                </div>

                <!-- Age Table -->
                <div class="bg-white rounded-2xl shadow-sm p-6 overflow-x-auto">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">연령별 상세 수치</h3>
                    <table class="w-full text-sm text-left text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3">연령 그룹</th>
                                <th scope="col" class="px-6 py-3 text-right">총 탑승자</th>
                                <th scope="col" class="px-6 py-3 text-right">생존자</th>
                                <th scope="col" class="px-6 py-3 text-right">사망자</th>
                                <th scope="col" class="px-6 py-3 text-right text-blue-600">생존율</th>
                            </tr>
                        </thead>
                        <tbody id="ageTableBody">
                            <!-- JS 렌더링 영역 -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        let rawData = [];
        let genderChartInstance = null;
        let ageChartInstance = null;

        // Chart.js 전역 기본 설정
        Chart.defaults.font.family = "'Pretendard', sans-serif";
        Chart.defaults.plugins.tooltip.padding = 10;
        
        // 연령 그룹 설정
        const AGE_GROUPS = [
            { id: 'child', label: '아동 (0-12세)', min: 0, max: 12 },
            { id: 'teen', label: '청소년 (13-18세)', min: 12.01, max: 18 },
            { id: 'adult', label: '성인 (19-59세)', min: 18.01, max: 59 },
            { id: 'senior', label: '노년 (60세 이상)', min: 59.01, max: 150 },
            { id: 'unknown', label: '연령 미상', min: null, max: null }
        ];

        // 페이지 로드 시 타이타닉 데이터 자동 다운로드 및 파싱
        window.onload = function() {
            // 온라인에 호스팅된 표준 타이타닉 데이터셋 URL
            const csvUrl = "https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv";

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    // 로딩 화면 숨기고 대시보드 표시
                    document.getElementById('loadingSection').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    updateDashboard();
                },
                error: function(error) {
                    document.getElementById('loadingSection').innerHTML = `
                        <p class="text-red-500 font-bold text-lg mb-2">데이터를 불러오는 데 실패했습니다.</p>
                        <p class="text-gray-500">${error.message}</p>
                    `;
                }
            });
        };

        // 필터 변경 이벤트
        document.getElementById('pclassFilter').addEventListener('change', updateDashboard);

        function updateDashboard() {
            const pclassFilter = document.getElementById('pclassFilter').value;
            
            // 데이터 필터링
            const filteredData = rawData.filter(row => {
                if(row.Survived === undefined || row.Survived === "") return false; // 헤더나 잘못된 빈 줄 제외
                if(pclassFilter === 'all') return true;
                return row.Pclass === pclassFilter;
            });

            // 통계 객체 초기화
            const stats = {
                total: 0,
                survived: 0,
                gender: {
                    male: { total: 0, survived: 0 },
                    female: { total: 0, survived: 0 }
                },
                age: {}
            };
            
            AGE_GROUPS.forEach(g => {
                stats.age[g.id] = { label: g.label, total: 0, survived: 0 };
            });

            // 데이터 집계
            filteredData.forEach(row => {
                const survived = parseInt(row.Survived);
                stats.total++;
                stats.survived += survived;

                // 성별 통계
                if (row.Sex === 'male') {
                    stats.gender.male.total++;
                    stats.gender.male.survived += survived;
                } else if (row.Sex === 'female') {
                    stats.gender.female.total++;
                    stats.gender.female.survived += survived;
                }

                // 연령 통계
                const ageStr = row.Age;
                if (!ageStr || ageStr.trim() === "") {
                    stats.age.unknown.total++;
                    stats.age.unknown.survived += survived;
                } else {
                    const age = parseFloat(ageStr);
                    const group = AGE_GROUPS.find(g => g.min !== null && age >= g.min && age <= g.max);
                    if (group) {
                        stats.age[group.id].total++;
                        stats.age[group.id].survived += survived;
                    }
                }
            });

            renderSummary(stats);
            renderTables(stats);
            renderCharts(stats);
        }

        function calculateRate(survived, total) {
            return total === 0 ? 0 : Math.round((survived / total) * 100);
        }

        function renderSummary(stats) {
            document.getElementById('totalPassengers').textContent = stats.total.toLocaleString();
            document.getElementById('totalSurvived').textContent = stats.survived.toLocaleString();
            document.getElementById('totalRate').textContent = calculateRate(stats.survived, stats.total) + '%';
        }

        function renderTables(stats) {
            // 성별 테이블
            const genderTbody = document.getElementById('genderTableBody');
            genderTbody.innerHTML = '';
            const genders = [
                { key: 'male', name: '남성 (Male)' },
                { key: 'female', name: '여성 (Female)' }
            ];

            genders.forEach(g => {
                const data = stats.gender[g.key];
                const rate = calculateRate(data.survived, data.total);
                genderTbody.innerHTML += `
                    <tr class="bg-white border-b">
                        <td class="px-6 py-4 font-medium text-gray-900">${g.name}</td>
                        <td class="px-6 py-4 text-right">${data.total}</td>
                        <td class="px-6 py-4 text-right text-emerald-600 font-medium">${data.survived}</td>
                        <td class="px-6 py-4 text-right text-red-500">${data.total - data.survived}</td>
                        <td class="px-6 py-4 text-right text-blue-600 font-bold">${rate}%</td>
                    </tr>
                `;
            });

            // 연령별 테이블
            const ageTbody = document.getElementById('ageTableBody');
            ageTbody.innerHTML = '';
            AGE_GROUPS.forEach(g => {
                const data = stats.age[g.id];
                const rate = calculateRate(data.survived, data.total);
                ageTbody.innerHTML += `
                    <tr class="bg-white border-b">
                        <td class="px-6 py-4 font-medium text-gray-900">${data.label}</td>
                        <td class="px-6 py-4 text-right">${data.total}</td>
                        <td class="px-6 py-4 text-right text-emerald-600 font-medium">${data.survived}</td>
                        <td class="px-6 py-4 text-right text-red-500">${data.total - data.survived}</td>
                        <td class="px-6 py-4 text-right text-blue-600 font-bold">${rate}%</td>
                    </tr>
                `;
            });
        }

        function renderCharts(stats) {
            // 차트 렌더링에 사용할 색상
            const survivedColor = 'rgba(52, 211, 153, 0.8)'; // Emerald 400
            const deadColor = 'rgba(248, 113, 113, 0.8)'; // Red 400

            // -- 성별 차트 (누적 막대) --
            if (genderChartInstance) genderChartInstance.destroy();
            const genderCtx = document.getElementById('genderChart').getContext('2d');
            
            const genderData = [stats.gender.male, stats.gender.female];
            genderChartInstance = new Chart(genderCtx, {
                type: 'bar',
                data: {
                    labels: ['남성 (Male)', '여성 (Female)'],
                    datasets: [
                        {
                            label: '생존자',
                            data: [genderData[0].survived, genderData[1].survived],
                            backgroundColor: survivedColor,
                        },
                        {
                            label: '사망자',
                            data: [genderData[0].total - genderData[0].survived, genderData[1].total - genderData[1].survived],
                            backgroundColor: deadColor,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterLabel: function(context) {
                                    const index = context.dataIndex;
                                    const total = genderData[index].total;
                                    const survived = genderData[index].survived;
                                    const rate = calculateRate(survived, total);
                                    if(context.datasetIndex === 0) {
                                        return `생존율: ${rate}%`;
                                    }
                                }
                            }
                        }
                    }
                }
            });

            // -- 연령별 차트 (누적 막대) --
            if (ageChartInstance) ageChartInstance.destroy();
            const ageCtx = document.getElementById('ageChart').getContext('2d');
            
            const ageLabels = AGE_GROUPS.map(g => g.label);
            const ageTotal = AGE_GROUPS.map(g => stats.age[g.id].total);
            const ageSurvived = AGE_GROUPS.map(g => stats.age[g.id].survived);
            const ageDead = ageTotal.map((t, i) => t - ageSurvived[i]);

            ageChartInstance = new Chart(ageCtx, {
                type: 'bar',
                data: {
                    labels: ageLabels,
                    datasets: [
                        {
                            label: '생존자',
                            data: ageSurvived,
                            backgroundColor: survivedColor,
                        },
                        {
                            label: '사망자',
                            data: ageDead,
                            backgroundColor: deadColor,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterLabel: function(context) {
                                    const index = context.dataIndex;
                                    const total = ageTotal[index];
                                    const survived = ageSurvived[index];
                                    const rate = calculateRate(survived, total);
                                    if(context.datasetIndex === 0) {
                                        return `생존율: ${rate}%`;
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
